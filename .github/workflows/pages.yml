name: Deploy Summit Bank to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist

          cp -R CSS dist/CSS
          cp -R img dist/img
          cp -R icon dist/icon
          cp HTML/index.html dist/index.html

          sed -i 's#../CSS/#CSS/#g; s#../img/#img/#g; s#../icon/#icon/#g' dist/index.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
